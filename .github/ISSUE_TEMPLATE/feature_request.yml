name: Feature request
description: Suggest an improvement for dataganger
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.

        Please keep examples free of private data, file paths, or sensitive values.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Workflow, use case, or screenshots if helpful.
