name: Bug report
description: Report a problem with dataganger
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        Please do not include dataset contents, column names, file paths, or sensitive values.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear summary of the bug.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Where did this happen?
      description: For example, Shiny app, CLI, or a specific function.
      placeholder: Shiny app / report_issue() / synthesize_data()
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the issue.
      placeholder: |-
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Paste any relevant version/platform details.
      placeholder: dataganger version, R version, OS, platform
