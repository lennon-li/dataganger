<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Type — Display & headings</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px dashed var(--paper-300); }
  .row:last-child { border: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); width: 86px; flex-shrink: 0; padding-top: 12px; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); margin-left: auto; padding-top: 12px; }
</style>
</head><body>
  <div class="row"><span class="tag">display</span><span class="t-display">DataGangeR</span><span class="spec">Instrument Serif · 72/1.08</span></div>
  <div class="row"><span class="tag">h1</span><span class="t-h1">Synthesise a double</span><span class="spec">Instrument Serif · 48/1.08</span></div>
  <div class="row"><span class="tag">h2</span><span class="t-h2">Profile your data</span><span class="spec">Instrument Serif · 36/1.22</span></div>
  <div class="row"><span class="tag">h3</span><span class="t-h3">Comparison report</span><span class="spec">Inter 600 · 28/1.22</span></div>
  <div class="row"><span class="tag">h4</span><span class="t-h4">Column roles</span><span class="spec">Inter 600 · 22/1.22</span></div>
</body></html>
