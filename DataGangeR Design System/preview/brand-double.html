<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Brand — The double mark</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); display: flex; align-items: center; gap: 32px; }
  .frame { background: var(--paper-100); border: 1px solid var(--border); border-radius: var(--radius-8); padding: 8px; }
  .meta { display: flex; flex-direction: column; gap: 8px; max-width: 340px; }
  h4 { font-family: var(--font-sans); font-size: 16px; margin: 0; }
  p { font-family: var(--font-sans); font-size: 13px; color: var(--fg-muted); margin: 0; line-height: 1.5; }
  .caption { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-subtle); }
</style>
</head><body>
  <div class="frame"><img src="../assets/double-mark.svg" width="220" height="146" alt=""/></div>
  <div class="meta">
    <span class="caption">illustration · multi-exposure</span>
    <h4>The double</h4>
    <p>The brand R, captured with the shutter open. Five offset copies fade from a faint green ghost in the deep past to a sharp magenta R in the present — the original dataset drifting forward into its synthetic double.</p>
  </div>
</body></html>
