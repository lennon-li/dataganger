<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Components — Chips & tags</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); display: flex; flex-direction: column; gap: 14px; font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); width: 96px; flex-shrink: 0; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 2px 10px; border-radius: 999px; font-family: var(--font-sans); font-size: 12px; font-weight: 500; border: 1px solid; line-height: 1.5; }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .chip-real { background: var(--real-50); color: var(--real-700); border-color: var(--real-100); }
  .chip-real .dot { background: var(--real-500); }
  .chip-synth { background: var(--synth-50); color: var(--synth-700); border-color: var(--synth-100); }
  .chip-synth .dot { background: var(--synth-500); }
  .chip-risk { background: var(--risk-50); color: var(--risk-700); border-color: #F2B36A; }
  .chip-risk .dot { background: var(--risk-500); }
  .chip-neutral { background: var(--paper-100); color: var(--ink-700); border-color: var(--paper-300); }
  .role { font-family: var(--font-mono); font-size: 11px; padding: 2px 6px; border-radius: 2px; background: var(--ink-900); color: var(--paper-50); letter-spacing: 0.02em; }
</style>
</head><body>
  <div class="row"><span class="label">brand pair</span>
    <span class="chip chip-real"><span class="dot"></span>Original</span>
    <span class="chip chip-synth"><span class="dot"></span>Synthetic</span>
  </div>
  <div class="row"><span class="label">privacy</span>
    <span class="chip chip-risk"><span class="dot"></span>Direct identifier</span>
    <span class="chip chip-risk"><span class="dot"></span>Free text</span>
    <span class="chip chip-risk"><span class="dot"></span>Quasi-identifier</span>
  </div>
  <div class="row"><span class="label">data types</span>
    <span class="chip chip-neutral">numeric</span>
    <span class="chip chip-neutral">factor</span>
    <span class="chip chip-neutral">haven_labelled</span>
    <span class="chip chip-neutral">Date</span>
  </div>
  <div class="row"><span class="label">role badges</span>
    <span class="role">id</span><span class="role">date</span><span class="role">geography</span><span class="role">free_text</span>
  </div>
</body></html>
