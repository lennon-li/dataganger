<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Components — Inputs & form</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; font-family: var(--font-sans); }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--ink-700); }
  .input, .select { font-family: var(--font-sans); font-size: 14px; padding: 8px 10px; background: var(--paper-50); border: 1px solid var(--paper-300); border-radius: 2px; color: var(--ink-900); }
  .input:focus, .select:focus { outline: none; border-color: var(--synth-500); box-shadow: 0 0 0 3px var(--synth-100); }
  .help { font-family: var(--font-sans); font-size: 11px; color: var(--fg-muted); }
  .seg { display: inline-flex; background: var(--paper-100); border: 1px solid var(--paper-300); border-radius: 4px; padding: 2px; }
  .seg button { font-family: var(--font-sans); font-size: 12px; font-weight: 500; padding: 5px 12px; background: transparent; border: 0; cursor: pointer; color: var(--ink-700); border-radius: 2px; }
  .seg button.active { background: var(--paper-50); box-shadow: var(--shadow-1), inset 0 1px 0 0 rgba(255,255,255,0.6); color: var(--ink-900); }
  .check { display: flex; gap: 8px; align-items: flex-start; font-family: var(--font-sans); font-size: 13px; color: var(--ink-900); }
  .check input { margin-top: 2px; accent-color: var(--synth-500); }
</style>
</head><body>
  <div class="field">
    <label>Dataset name</label>
    <input class="input" value="health_survey_q4"/>
    <span class="help">Used in the export bundle filename.</span>
  </div>
  <div class="field">
    <label>Purpose</label>
    <select class="select"><option>ai_programming</option><option>shiny_prototype</option><option>teaching</option></select>
    <span class="help">Sets coarsening &amp; rare-level defaults.</span>
  </div>
  <div class="field">
    <label>Synthesis level</label>
    <div class="seg"><button>schema</button><button class="active">marginal</button><button>hifi</button></div>
  </div>
  <div class="field">
    <label>Risk acknowledgement</label>
    <label class="check"><input type="checkbox"/> I have reviewed the privacy warnings and understand this output is not safe for public release.</label>
  </div>
</body></html>
