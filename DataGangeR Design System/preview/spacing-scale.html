<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Spacing — 4px grid</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--ink-900); width: 64px; flex-shrink: 0; }
  .bar { height: 10px; background: var(--synth-500); border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-left: auto; }
</style>
</head><body>
  <div class="row"><span class="label">space-1</span><span class="bar" style="width: 4px;"></span><span class="px">4 px</span></div>
  <div class="row"><span class="label">space-2</span><span class="bar" style="width: 8px;"></span><span class="px">8 px</span></div>
  <div class="row"><span class="label">space-3</span><span class="bar" style="width: 12px;"></span><span class="px">12 px</span></div>
  <div class="row"><span class="label">space-4</span><span class="bar" style="width: 16px;"></span><span class="px">16 px</span></div>
  <div class="row"><span class="label">space-5</span><span class="bar" style="width: 20px;"></span><span class="px">20 px</span></div>
  <div class="row"><span class="label">space-6</span><span class="bar" style="width: 24px;"></span><span class="px">24 px · gutter</span></div>
  <div class="row"><span class="label">space-8</span><span class="bar" style="width: 32px;"></span><span class="px">32 px</span></div>
  <div class="row"><span class="label">space-10</span><span class="bar" style="width: 40px;"></span><span class="px">40 px</span></div>
  <div class="row"><span class="label">space-12</span><span class="bar" style="width: 48px;"></span><span class="px">48 px</span></div>
  <div class="row"><span class="label">space-16</span><span class="bar" style="width: 64px;"></span><span class="px">64 px</span></div>
</body></html>
