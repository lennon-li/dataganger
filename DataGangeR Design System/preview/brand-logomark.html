<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Brand — Logomark</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); display: flex; align-items: center; gap: 32px; min-height: 180px; }
  .swatch { display: flex; align-items: center; justify-content: center; width: 124px; height: 124px; background: var(--paper-100); border: 1px solid var(--border); border-radius: var(--radius-8); }
  .swatch.dark { background: var(--ink-900); }
  .swatch.paper { background: var(--paper-50); }
  .meta { display: flex; flex-direction: column; gap: 6px; }
  .caption { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); }
  img { width: 88px; height: 88px; }
</style>
</head><body>
  <div class="swatch dark"><img src="../assets/logomark.svg" alt=""/></div>
  <div class="swatch paper"><img src="../assets/logomark.svg" alt=""/></div>
  <div class="meta">
    <div class="caption">logomark · 96×96 · svg</div>
    <div style="font-family: var(--font-sans); font-size: 14px; color: var(--fg);">Italic magenta R in front (the synthetic), trailing a green ghost-R behind it. Source data rows sit beside the R in lichen green — the data being ghosted.</div>
    <div class="caption" style="margin-top: 8px;">assets/logomark.svg</div>
  </div>
</body></html>
