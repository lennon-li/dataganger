<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Spacing — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--bg); display: flex; align-items: center; gap: 20px; font-family: var(--font-sans); }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 84px; height: 84px; background: var(--paper-100); border: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--ink-900); }
  .desc { font-family: var(--font-sans); font-size: 11px; color: var(--fg-muted); text-align: center; max-width: 90px; line-height: 1.4; }
</style>
</head><body>
  <div class="item"><div class="box" style="border-radius:2px;"></div><div class="name">radius-2</div><div class="desc">inputs, chips</div></div>
  <div class="item"><div class="box" style="border-radius:4px;"></div><div class="name">radius-4</div><div class="desc">buttons, small cards</div></div>
  <div class="item"><div class="box" style="border-radius:8px;"></div><div class="name">radius-8</div><div class="desc">large cards, modals</div></div>
  <div class="item"><div class="box" style="border-radius:999px; width: 124px; height: 36px;"></div><div class="name">radius-pill</div><div class="desc">tags only</div></div>
</body></html>
