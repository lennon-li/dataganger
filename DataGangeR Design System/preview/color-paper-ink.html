<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Colors — Paper & Ink</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); font-family: var(--font-sans); }
  .group { display: flex; gap: 4px; margin-bottom: 16px; }
  .group:last-child { margin-bottom: 0; }
  .swatch { flex: 1; aspect-ratio: 1.6; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; border-radius: var(--radius-4); border: 1px solid rgba(17,20,15,0.06); }
  .swatch .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; }
  .swatch .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
  .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 8px; }
  .dark .name, .dark .hex { color: var(--paper-50); }
</style>
</head><body>
  <div class="label">paper · the warm off-white base</div>
  <div class="group">
    <div class="swatch" style="background:#FBFAF6"><div class="name">paper-50</div><div class="hex">#FBFAF6</div></div>
    <div class="swatch" style="background:#F4F1E9"><div class="name">paper-100</div><div class="hex">#F4F1E9</div></div>
    <div class="swatch" style="background:#E9E4D5"><div class="name">paper-200</div><div class="hex">#E9E4D5</div></div>
    <div class="swatch" style="background:#D7D0BB"><div class="name">paper-300</div><div class="hex">#D7D0BB</div></div>
    <div class="swatch" style="background:#B8B099"><div class="name">paper-400</div><div class="hex">#B8B099</div></div>
  </div>
  <div class="label">ink · slightly green-shifted black</div>
  <div class="group">
    <div class="swatch" style="background:#C8CABE"><div class="name">ink-100</div><div class="hex">#C8CABE</div></div>
    <div class="swatch" style="background:#9A9C90"><div class="name">ink-300</div><div class="hex">#9A9C90</div></div>
    <div class="swatch dark" style="background:#5C5F55"><div class="name">ink-500</div><div class="hex">#5C5F55</div></div>
    <div class="swatch dark" style="background:#2B2E27"><div class="name">ink-700</div><div class="hex">#2B2E27</div></div>
    <div class="swatch dark" style="background:#11140F"><div class="name">ink-900</div><div class="hex">#11140F</div></div>
  </div>
</body></html>
