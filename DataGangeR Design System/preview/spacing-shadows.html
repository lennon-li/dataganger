<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Spacing — Shadow & shine</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px 28px 44px; background: var(--bg); display: flex; align-items: center; gap: 28px; font-family: var(--font-sans); }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 96px; height: 76px; background: var(--paper-50); border-radius: 8px; border: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--ink-900); }
  .desc { font-family: var(--font-sans); font-size: 11px; color: var(--fg-muted); text-align: center; }
  .shine-box { background: linear-gradient(180deg, #E97FB8, #D43A8A); border: 0; }
</style>
</head><body>
  <div class="item"><div class="box" style="box-shadow: var(--shadow-1);"></div><div class="name">shadow-1</div><div class="desc">resting cards</div></div>
  <div class="item"><div class="box" style="box-shadow: var(--shadow-2);"></div><div class="name">shadow-2</div><div class="desc">hover, popovers</div></div>
  <div class="item"><div class="box" style="box-shadow: var(--shadow-3);"></div><div class="name">shadow-3</div><div class="desc">modals</div></div>
  <div class="item"><div class="box shine-box" style="box-shadow: var(--shine);"></div><div class="name">shine</div><div class="desc">primary CTA, wordmark</div></div>
</body></html>
