<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Components — Compare table</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--bg); font-family: var(--font-sans); font-size: 13px; }
  .frame { background: var(--paper-50); border: 1px solid var(--border); border-radius: var(--radius-8); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px 12px; text-align: left; }
  thead th { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); font-weight: 500; border-bottom: 2px solid var(--ink-900); }
  thead th.real { color: var(--real-700); }
  thead th.synth { color: var(--synth-700); }
  tbody td { border-bottom: 1px solid var(--paper-300); font-family: var(--font-mono); font-feature-settings: "tnum"; color: var(--ink-900); }
  tbody tr:last-child td { border: 0; }
  td:first-child { font-family: var(--font-sans); font-weight: 500; }
  .num { text-align: right; }
  .delta-ok { color: var(--real-700); }
  .delta-warn { color: var(--risk-500); }
</style>
</head><body>
  <div class="frame"><table>
    <thead><tr><th>variable</th><th class="real num">original</th><th class="synth num">synthetic</th><th class="num">Δ</th></tr></thead>
    <tbody>
      <tr><td>age — mean</td><td class="num">54.2</td><td class="num">54.4</td><td class="num delta-ok">+0.2</td></tr>
      <tr><td>bmi — mean</td><td class="num">26.3</td><td class="num">26.1</td><td class="num delta-ok">−0.2</td></tr>
      <tr><td>systolic_bp — mean</td><td class="num">128.7</td><td class="num">130.1</td><td class="num delta-ok">+1.4</td></tr>
      <tr><td>smoking — pct Current</td><td class="num">18.0%</td><td class="num">21.5%</td><td class="num delta-warn">+3.5pp</td></tr>
    </tbody>
  </table></div>
</body></html>
