<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Type — Mono & numerics</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); display: flex; flex-direction: column; gap: 12px; font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); width: 86px; flex-shrink: 0; }
  .panel { background: var(--paper-100); border: 1px solid var(--border); border-radius: var(--radius-4); padding: 10px 12px; font-family: var(--font-mono); font-size: 13px; color: var(--ink-900); }
  .panel .k { color: var(--synth-700); }
  .panel .v { color: var(--real-700); }
  .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .num-grid div { font-family: var(--font-mono); font-feature-settings: "tnum"; font-size: 18px; color: var(--ink-900); text-align: right; padding: 6px 10px; background: var(--paper-100); border-radius: 4px; }
</style>
</head><body>
  <div class="row"><span class="tag">mono inline</span><span class="t-mono">purpose = "ai_programming"</span></div>
  <div class="row"><span class="tag">mono block</span>
    <div class="panel"><span class="k">level</span> <span class="v">"marginal"</span> · <span class="k">n</span> <span class="v">200</span> · <span class="k">seed</span> <span class="v">42</span></div>
  </div>
  <div class="row" style="align-items: stretch;"><span class="tag" style="padding-top:6px;">tabular nums</span>
    <div class="num-grid" style="flex:1;">
      <div>1,204</div><div>87.3%</div><div>0.412</div><div>£12.40</div><div>9,021</div>
      <div>   12</div><div> 4.1%</div><div>0.008</div><div> £0.99</div><div>   38</div>
    </div>
  </div>
</body></html>
