<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Brand — Wordmark & Lockup</title>
<link rel="stylesheet" href="../colors_and_type.css"/>

  <div class="row"><span class="caption">wordmark</span><img src="../assets/wordmark.svg" height="56" alt="DataGangeR"/></div>
