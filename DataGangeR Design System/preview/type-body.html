<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Type — Body, label, caption</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); width: 86px; flex-shrink: 0; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); margin-left: auto; }
</style>
</head><body>
  <div class="row"><span class="tag">eyebrow</span><span class="t-eyebrow">Step 02 · profile</span><span class="spec">JetBrains Mono · 12 · upper</span></div>
  <div class="row"><span class="tag">label</span><span class="t-label">Purpose</span><span class="spec">Inter 600 · 13</span></div>
  <div class="row"><span class="tag">body</span><span class="t-body">Synthesise a doppelgänger of your dataset.</span><span class="spec">Inter 400 · 15</span></div>
  <div class="row"><span class="tag">body-sm</span><span class="t-body-sm">Secondary copy, helper text under inputs.</span><span class="spec">Inter 400 · 13 · ink-500</span></div>
  <div class="row"><span class="tag">caption</span><span class="t-caption">Footnote, table aside, timestamp.</span><span class="spec">Inter 400 · 12 · ink-300</span></div>
</body></html>
